    <!-- Лише 3 дійсно критичні preconnect-и:
         fonts.gstatic.com — файли шрифтів (cross-origin),

         xzcx3aim.apicdn.sanity.io — GROQ API цього проєкту. -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.sanity.io" crossorigin />
    <link rel="preconnect" href="https://xzcx3aim.apicdn.sanity.io" crossorigin />

    <!-- LCP-фон головної: preload лише для десктопу.
         На мобільному ця картинка краде канал у критичних JS/шрифтів,
         і виграш від high-priority перетворюється на втрату. -->
    <link
      rel="preload"
      as="image"
      href="/img/background-img.webp"
      type="image/webp"
      media="(min-width: 768px)"
    />

    <!-- Meta Pixel Code (deferred to keep critical path light) -->
    <script>
      (function () {
        if (typeof window === 'undefined') return;
        var loaded = false;
        function loadPixel() {
          if (loaded) return;
          loaded = true;
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = [];
            t = b.createElement(e); t.async = !0; t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
          window.fbq('init', '1368446248336392');
          window.fbq('track', 'PageView');
        }
        // Стартуємо Pixel ПІСЛЯ завантаження сторінки або при першій взаємодії —
        // що настане раніше. Так він не блокує LCP/FCP.
        var trigger = function () {
          ['scroll', 'click', 'keydown', 'touchstart', 'mousemove'].forEach(function (ev) {
            window.removeEventListener(ev, trigger);
          });
          loadPixel();
        };
        ['scroll', 'click', 'keydown', 'touchstart', 'mousemove'].forEach(function (ev) {
          window.addEventListener(ev, trigger, { once: true, passive: true });
        });
        var onLoad = function () {
          var idle = window.requestIdleCallback || function (cb) { return setTimeout(cb, 1500); };
          idle(loadPixel, { timeout: 4000 });
        };
        if (document.readyState === 'complete') onLoad();
        else window.addEventListener('load', onLoad, { once: true });
      })();
    </script>
    <!-- End Meta Pixel Code -->
